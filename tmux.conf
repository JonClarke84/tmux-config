unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Simple command to create a new session
bind-key C-n command-prompt -p "New session name:" "new-session -s %% -c '#{pane_current_path}'"

# Custom command to create a session with a Neovim and terminal window (legacy)
bind-key C-s command-prompt -p "Session name:" "run-shell 'tmux has-session -t %% 2>/dev/null || ( \
    tmux new-session -d -s %% -n %%-neovim && \
    tmux send-keys -t %%:1 nvim C-m && \
    tmux new-window -t %% -n %%-terminal \
) && tmux attach -t %%'"

# Hotkey to set up standard four window layout in current session
bind-key C-w \
  rename-window "neovim" \; \
  new-window -n "terminal" \; \
  new-window -n "server" \; \
  new-window -n "claude" \; \
  select-window -t 0

set-option -g status-position top
set -g status-right '#S'
set -g status-left ''

# Theme options (must be set before catppuccin plugin loads)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux#v2.1.2'

# Resurrect/Continuum options
set -g @resurrect-auto-save 'on'
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
